<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Async Task Timer</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #333;
    }
    #app { width: 100vw; height: 100vh; }

    /* Overlay */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; justify-content: center; align-items: center;
      backdrop-filter: blur(3px);
    }

    /* Dialog card */
    .dialog {
      background: #fff; border-radius: 14px; padding: 32px;
      width: 420px; max-width: 92vw;
      box-shadow: 0 24px 80px rgba(0,0,0,.25);
      animation: pop .25s cubic-bezier(.22,1,.36,1);
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(.92) translateY(16px); }
      to   { opacity: 1; transform: none; }
    }

    .title {
      font-size: 20px; font-weight: 700; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .task {
      font-size: 14px; color: #555; padding: 12px 16px;
      background: #f7f8fa; border-radius: 10px;
      margin-bottom: 24px; line-height: 1.6;
      border-left: 4px solid #4a90d9;
      word-break: break-all;
    }

    /* Picker presets */
    .presets {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 10px; margin-bottom: 16px;
    }
    .preset-btn {
      padding: 14px 4px; border: 2px solid #e8eaed; border-radius: 12px;
      background: #fff; color: #333; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all .15s ease; text-align: center;
      line-height: 1.2;
    }
    .preset-btn:hover {
      border-color: #4a90d9; background: #4a90d9; color: #fff;
      transform: translateY(-3px); box-shadow: 0 6px 20px rgba(74,144,217,.35);
    }
    .preset-btn:active { transform: translateY(-1px); }
    .preset-btn span { display: block; font-size: 12px; font-weight: 400; opacity: .7; margin-top: 2px; }

    /* Custom input row */
    .custom-row {
      display: flex; gap: 8px; margin-bottom: 16px; align-items: center;
    }
    .custom-row input {
      flex: 1; padding: 10px 14px; border: 2px solid #e8eaed; border-radius: 10px;
      font-size: 15px; font-weight: 600; background: #fff; color: #333;
      outline: none; transition: border-color .15s; text-align: center;
      -moz-appearance: textfield;
    }
    .custom-row input::-webkit-outer-spin-button,
    .custom-row input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .custom-row input:focus { border-color: #4a90d9; }
    .custom-row .unit { font-size: 13px; color: #999; white-space: nowrap; }
    .custom-row button {
      padding: 10px 20px; border: none; border-radius: 10px;
      background: #4a90d9; color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .custom-row button:hover {
      background: #3a7bc8; box-shadow: 0 4px 12px rgba(74,144,217,.3);
    }

    .cancel-btn {
      display: block; width: 100%; background: none; border: none;
      color: #aaa; padding: 12px; cursor: pointer; font-size: 14px;
      text-align: center; border-radius: 8px; transition: all .1s;
    }
    .cancel-btn:hover { color: #666; background: #f5f5f5; }

    /* Expired dialog */
    .expired-dialog { border-top: 4px solid #ff9800; max-height: 80vh; overflow-y: auto; }
    .expired-dialog .title { color: #e65100; }
    .expired-dialog .task { border-left-color: #ff9800; }
    .expired-hint {
      text-align: center; color: #999; font-size: 13px;
      margin-bottom: 20px; line-height: 1.5;
    }
    .expired-list { display: flex; flex-direction: column; gap: 16px; }
    .expired-item {
      padding: 16px; background: #fffaf0; border: 1px solid #ffe0b2;
      border-radius: 10px;
    }
    .expired-item .task { margin-bottom: 12px; }
    .expired-actions { display: flex; flex-direction: column; gap: 10px; }

    .action-btn {
      border: none; border-radius: 10px; padding: 12px 16px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all .15s; text-align: center;
    }
    .action-btn:active { transform: scale(.98); }

    .done-btn { background: #4caf50; color: #fff; font-size: 16px; }
    .done-btn:hover { background: #388e3c; box-shadow: 0 4px 12px rgba(76,175,80,.3); }

    .snooze-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .snooze-btn {
      padding: 10px 4px; background: #fff8e1; color: #e65100;
      border: 1.5px solid #ffcc02; border-radius: 8px;
      font-size: 13px; font-weight: 600;
    }
    .snooze-btn:hover { background: #ffb74d; color: #fff; border-color: #ffb74d; }

    .dismiss-btn { background: #f5f5f5; color: #999; }
    .dismiss-btn:hover { background: #ef5350; color: #fff; }
  </style>
  <script type="module" crossorigin src="./assets/index-CDLGYjmT.js"></script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
